<!-- Project title in header -->
<!-- Project title in header -->
<script>
(function() {
  let lastTitle = '';
  function updateProjectTitle() {
    const currentTitle = document.title;
    if (currentTitle === lastTitle) return;
    lastTitle = currentTitle;

    const header = document.querySelector('[local-style="38394821"]');
    if (!header) return;
    const projectName = currentTitle.split(' - ')[0].trim();
    const isHomepage = document.body.classList.contains('homepage');
    const isValid = projectName && projectName !== 'Alex Strada' && !isHomepage;

    let subtitle = document.getElementById('header-project-title');
    if (!isValid) {
      if (subtitle) subtitle.remove();
      return;
    }
    if (!subtitle) {
      subtitle = document.createElement('div');
      subtitle.id = 'header-project-title';
      header.appendChild(subtitle);
    }
    subtitle.textContent = projectName;
  }
  setInterval(updateProjectTitle, 50);
  setTimeout(updateProjectTitle, 500);
})();
</script>

<!-- Menu: replace set-link <a> with <span> + mobile accordion -->
<script>
(function() {
  var initialized = false;

  function setupMenu() {
    var menu = document.getElementById('site_menu');
    if (!menu) return;
    if (initialized) return;

    // Step 1: Replace set-link <a> tags with <span> to prevent navigation
    var labelSelectors = [
      '#site_menu > .set-link > a',
      '#site_menu > .set-link > .indent > .set-link > a',
      '#site_menu > .set-link > .indent > .set-link > .indent > .set-link > a'
    ];
    var replaced = false;
    labelSelectors.forEach(function(selector) {
      document.querySelectorAll(selector).forEach(function(a) {
        var span = document.createElement('span');
        span.innerHTML = a.innerHTML;
        span.className = a.className;
        a.parentNode.replaceChild(span, a);
        replaced = true;
      });
    });

    if (!replaced) return; // menu not ready yet

    // Step 2: Attach accordion behavior on mobile
    if (!document.body.classList.contains('mobile')) {
      initialized = true;
      return;
    }

    var setLinks = menu.querySelectorAll('.set-link');
    setLinks.forEach(function(setLink) {
      var toggle = setLink.querySelector(':scope > span');
      var indent = setLink.querySelector(':scope > .indent');
      if (!toggle || !indent) return;

      // Remove any existing listener (in case of re-init)
      var newToggle = toggle.cloneNode(true);
      toggle.parentNode.replaceChild(newToggle, toggle);

      newToggle.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();

        // Close siblings at the same level
        var parent = setLink.parentElement;
        var siblings = parent.querySelectorAll(':scope > .set-link');
        siblings.forEach(function(sib) {
          if (sib !== setLink && sib.classList.contains('accordion-open')) {
            sib.classList.remove('accordion-open');
          }
        });

        setLink.classList.toggle('accordion-open');
      });
    });

    initialized = true;
  }

  // Try repeatedly until menu is ready
  var attempts = 0;
  var interval = setInterval(function() {
    setupMenu();
    attempts++;
    if (initialized || attempts > 40) clearInterval(interval);
  }, 100);

  // Also re-init if Cargo rebuilds the menu
  var observer = new MutationObserver(function() {
    initialized = false;
    setupMenu();
  });

  document.addEventListener('DOMContentLoaded', function() {
    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  });
})();
</script>

<script>
(function () {
  // MOBILE: Cargo rebuilds #site_menu from scratch each time the menu opens,
  // collapsing every accordion. When the menu opens we re-expand the path of
  // sections leading to the currently active link, so the visitor lands where
  // they left off instead of having to re-navigate the whole tree.
  //
  // We add the same `accordion-open` class the manual toggle uses, so the +/-
  // indicators stay in sync. This is button-driven with a short bounded poll
  // (no global MutationObserver) to avoid any observer feedback loops.
  function expandActiveSection() {
    if (!document.body.classList.contains('mobile')) return false;
    var menu = document.getElementById('site_menu');
    if (!menu) return false;
    var active = menu.querySelector('a.active');
    if (!active) return false;
    var el = active.parentElement;
    while (el && el.id !== 'site_menu') {
      if (el.classList && el.classList.contains('set-link')) {
        el.classList.add('accordion-open');
      }
      el = el.parentElement;
    }
    return true;
  }

  // Poll briefly until the freshly-rebuilt menu is populated, then stop.
  function runWhenReady() {
    var tries = 0;
    var timer = setInterval(function () {
      tries++;
      if (expandActiveSection() || tries > 30) clearInterval(timer);
    }, 50);
  }

  // The menu button re-renders #site_menu on each open, so react to its click.
  document.addEventListener('click', function (e) {
    var btn = e.target && e.target.closest && e.target.closest('#site_menu_button');
    if (btn) runWhenReady();
  }, true);

  // Cover the case where the menu is already present on load.
  if (document.readyState !== 'loading') runWhenReady();
  else document.addEventListener('DOMContentLoaded', runWhenReady);
})();
</script>
